# Docker Compose orchestration for Crack Jad.
#
# Services:
# - server: Node/Express web app and API proxy (public entrypoint on port 3000)
# - ml-service: FastAPI + YOLOv8 inference worker (internal service on port 8000)
#
# The server depends on a healthy ml-service container before startup.
services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - app-network

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/crack-yolov8l.pt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

networks:
  # Shared bridge network so services can resolve each other by name
  # (e.g., server calls http://ml-service:8000 via Docker DNS).
  app-network:
    driver: bridge
