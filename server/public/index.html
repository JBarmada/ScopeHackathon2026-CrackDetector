<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autodesk Crack Inspector</title>
  <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h1>Crack Inspector</h1>

      <!-- Model Upload Section -->
      <section class="panel">
        <h2>3D Model</h2>
        <div class="upload-group">
          <input type="file" id="model-file" accept=".rvt,.dwg,.ifc,.nwd,.obj,.fbx,.glb,.stp,.step">
          <button id="upload-model-btn" disabled>Upload &amp; Translate</button>
        </div>
        <div id="model-status" class="status"></div>
        <label for="model-select">Load Translated Model:</label>
        <select id="model-select">
          <option value="">-- Select a model --</option>
        </select>
        <button id="load-model-btn" disabled>Load in Viewer</button>
        <button id="refresh-models-btn">Refresh List</button>
      </section>

      <!-- Crack Detection Section -->
      <section class="panel">
        <h2>Crack Detection</h2>
        <button id="scan-view-btn">Scan Current View</button>
        <div class="upload-group">
          <input type="file" id="photo-file" accept="image/*">
          <button id="detect-btn" disabled>Detect from Photo</button>
        </div>
        <label for="confidence-slider">Confidence: <span id="confidence-val">0.25</span></label>
        <input type="range" id="confidence-slider" min="0" max="1" step="0.05" value="0.25">
        <div id="detect-status" class="status"></div>

        <!-- Detection Results -->
        <div id="results-panel" class="hidden">
          <h3>Results</h3>
          <div id="results-list"></div>
        </div>
      </section>

      <section class="panel">
        <button id="clear-overlays-btn">Clear Overlays</button>
      </section>
    </aside>

    <!-- Main Viewer Area -->
    <main id="main-area">
      <div id="viewer-container"></div>
      <canvas id="photo-canvas" class="hidden"></canvas>
    </main>
  </div>

  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
